<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAKA World Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    min-height:100vh;
    color:white;
    overflow-x:hidden;

    background:
    linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.75)),
    url("https://images.unsplash.com/photo-1627856013091-fed6e4e30025?q=80&w=2000");

    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

.container{
    max-width:1300px;
    margin:auto;
    padding:25px;
}

.header{
    text-align:center;
    margin-bottom:25px;
}

.logo{
    font-size:4rem;
    font-weight:700;
    background:linear-gradient(90deg,#22c55e,#06b6d4);
    -webkit-background-clip:text;
    color:transparent;
}

.subtitle{
    opacity:.8;
}

.glass{
    backdrop-filter:blur(20px);
    background:rgba(15,23,42,.55);
    border:1px solid rgba(255,255,255,.08);
    box-shadow:
    0 0 20px rgba(0,0,0,.3),
    0 0 50px rgba(34,197,94,.08);
}

.hero{
    border-radius:25px;
    padding:30px;
    margin-bottom:20px;
}

.hero-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:15px;
}

.status{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:600;
}

.dot{
    width:12px;
    height:12px;
    border-radius:50%;
    background:#22c55e;

    box-shadow:
    0 0 10px #22c55e,
    0 0 25px #22c55e,
    0 0 50px #22c55e;
}

.server-icon{
    width:90px;
    height:90px;
    border-radius:20px;
    border:2px solid rgba(255,255,255,.1);
}

.progress-box{
    margin-top:25px;
}

.progress{
    width:100%;
    height:16px;
    background:rgba(255,255,255,.08);
    border-radius:999px;
    overflow:hidden;
}

.progress-bar{
    height:100%;
    width:0%;
    border-radius:999px;
    background:linear-gradient(90deg,#22c55e,#06b6d4);
    transition:.8s;
}

.stats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
    margin-bottom:20px;
}

.card{
    padding:20px;
    border-radius:20px;
    text-align:center;
}

.card h2{
    font-size:2rem;
    margin-top:8px;
}

.players-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:15px;
}

.player{
    display:flex;
    gap:15px;
    align-items:center;
    padding:15px;
    border-radius:18px;
    transition:.3s;
}

.player:hover{
    transform:translateY(-4px);
    border-color:#22c55e;
}

.player img{
    width:60px;
    height:60px;
    border-radius:12px;
}

.player-name{
    font-weight:600;
}

.player-uuid{
    font-size:.7rem;
    opacity:.6;
    word-break:break-all;
}

.section-title{
    margin-bottom:15px;
    font-size:1.3rem;
}

.time{
    opacity:.7;
}

.refresh{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#22c55e,#06b6d4);
    color:white;
    cursor:pointer;
    font-weight:600;
}

@media(max-width:900px){

    .stats{
        grid-template-columns:repeat(2,1fr);
    }

    .hero-top{
        flex-direction:column;
        text-align:center;
    }

}

</style>
</head>
<body>

<div class="container">

    <div class="header">
        <div class="logo">SAKA World</div>
        <div class="subtitle">
            Premium Minecraft Server Dashboard
        </div>
    </div>

    <div class="hero glass">

        <div class="hero-top">

            <div>

                <div class="status">
                    <span class="dot"></span>
                    <span id="statusText">
                        ONLINE
                    </span>
                </div>

                <h1 style="margin-top:10px">
                    SAKA World
                </h1>

                <p id="motd">
                    Loading...
                </p>

            </div>

            <img id="icon" class="server-icon">

        </div>

        <div class="progress-box">

            <div style="
            display:flex;
            justify-content:space-between;
            margin-bottom:8px">

                <span>Player Capacity</span>
                <span id="capacity">
                    0 / 0
                </span>

            </div>

            <div class="progress">
                <div
                class="progress-bar"
                id="progressBar"></div>
            </div>

        </div>

        <button
        class="refresh"
        onclick="loadServer()">
            Refresh
        </button>

    </div>

    <div class="stats">

        <div class="card glass">
            <small>Players</small>
            <h2 id="players">0</h2>
        </div>

        <div class="card glass">
            <small>Version</small>
            <h2 id="version">-</h2>
        </div>

        <div class="card glass">
            <small>Software</small>
            <h2 id="software">-</h2>
        </div>

        <div class="card glass">
            <small>Time</small>
            <h2 id="clock">--:--</h2>
        </div>

    </div>

    <div class="glass card">

        <h2 class="section-title">
            Online Players
        </h2>

        <div
        class="players-grid"
        id="playerList">

            Loading...

        </div>

    </div>

</div>

<script>

const API =
"https://api.mcsrvstat.us/3/168.144.40.12";

async function loadServer(){

    try{

        const res = await fetch(API);
        const data = await res.json();

        document.getElementById("icon").src =
        data.icon;

        document.getElementById("motd").textContent =
        data.motd?.clean?.[0] || "No MOTD";

        document.getElementById("players").textContent =
        data.players?.online || 0;

        document.getElementById("version").textContent =
        data.version || "-";

        document.getElementById("software").textContent =
        data.software || "-";

        const online =
        data.players?.online || 0;

        const max =
        data.players?.max || 0;

        document.getElementById("capacity")
        .textContent =
        `${online} / ${max}`;

        const percent =
        max ? (online/max)*100 : 0;

        document.getElementById("progressBar")
        .style.width =
        percent + "%";

        const playerList =
        document.getElementById("playerList");

        if(data.players?.list?.length){

            playerList.innerHTML =
            data.players.list.map(player => `

            <div class="player glass">

                <img src="
                https://mc-heads.net/avatar/${player.name}/100">

                <div>

                    <div class="player-name">
                        ${player.name}
                    </div>

                    <div class="player-uuid">
                        ${player.uuid}
                    </div>

                </div>

            </div>

            `).join("");

        }else{

            playerList.innerHTML =
            "<p>Tidak ada player online.</p>";

        }

    }catch(e){

        console.error(e);

    }

}

function updateClock(){

    const now = new Date();

    document.getElementById("clock")
    .textContent =
    now.toLocaleTimeString("id-ID");

}

loadServer();
updateClock();

setInterval(loadServer,30000);
setInterval(updateClock,1000);

</script>

</body>
</html>
