<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAKA World</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
color:white;
overflow-x:hidden;

background:linear-gradient(
-45deg,
#020617,
#0f172a,
#1e293b,
#0f172a
);

background-size:400% 400%;
animation:bg 15s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
max-width:1300px;
margin:auto;
padding:25px;
}

.logo{
font-size:4rem;
font-weight:700;
text-align:center;
background:linear-gradient(90deg,#22c55e,#06b6d4);
-webkit-background-clip:text;
color:transparent;
}

.subtitle{
text-align:center;
opacity:.8;
margin-bottom:25px;
}

.glass{
background:rgba(255,255,255,.06);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.1);
box-shadow:0 8px 32px rgba(0,0,0,.3);
}

.hero{
padding:30px;
border-radius:25px;
margin-bottom:20px;
}

.hero-top{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:20px;
}

.server-icon{
width:100px;
height:100px;
border-radius:20px;
}

.status{
display:flex;
align-items:center;
gap:10px;
font-weight:600;
}

.dot{
width:12px;
height:12px;
border-radius:50%;
background:#22c55e;
box-shadow:0 0 15px #22c55e;
}

.offline{
background:#ef4444 !important;
box-shadow:0 0 15px #ef4444 !important;
}

.hero-stats{
display:flex;
gap:15px;
margin-top:20px;
flex-wrap:wrap;
}

.mini{
padding:12px 20px;
border-radius:15px;
background:rgba(255,255,255,.05);
}

.mini span{
display:block;
font-size:.8rem;
opacity:.7;
}

.mini strong{
font-size:1.2rem;
}

.progress{
height:16px;
background:rgba(255,255,255,.08);
border-radius:999px;
overflow:hidden;
margin-top:10px;
}

.progress-bar{
height:100%;
width:0;
transition:1s;
background:linear-gradient(
90deg,
#22c55e,
#06b6d4
);
box-shadow:
0 0 15px #22c55e,
0 0 30px #06b6d4;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin:20px 0;
}

.card{
padding:20px;
border-radius:20px;
text-align:center;
}

.card h2{
margin-top:8px;
font-size:2rem;
}

.copy-btn{
padding:12px 20px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
color:white;
background:linear-gradient(
90deg,
#22c55e,
#06b6d4
);
}

.chart-card{
padding:20px;
border-radius:25px;
margin-bottom:20px;
}

.players-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:15px;
}

.player{
padding:15px;
border-radius:18px;
display:flex;
gap:15px;
align-items:center;
position:relative;
overflow:hidden;
transition:.3s;
}

.player:hover{
transform:translateY(-4px);
}

.player::before{
content:"";
position:absolute;
left:-100%;
top:0;
width:100%;
height:100%;

background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,.15),
transparent);

transition:.8s;
}

.player:hover::before{
left:100%;
}

.player img{
width:60px;
height:60px;
border-radius:12px;
}

.player-name{
font-weight:600;
}

.player-uuid{
font-size:.7rem;
opacity:.6;
word-break:break-all;
}

.section{
padding:20px;
border-radius:25px;
}

.section-title{
margin-bottom:20px;
}

.refresh{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
background:linear-gradient(
90deg,
#22c55e,
#06b6d4
);
color:white;
}

@media(max-width:900px){

.stats{
grid-template-columns:repeat(2,1fr);
}

.hero-top{
flex-direction:column;
text-align:center;
}

.logo{
font-size:3rem;
}

}

</style>
</head>
<body>

<div class="container">

<div class="logo">SAKA World</div>
<div class="subtitle">Premium Minecraft Dashboard</div>

<div class="hero glass">

<div class="hero-top">

<div>

<div class="status">
<div class="dot" id="dot"></div>
<span id="statusText">ONLINE</span>
</div>

<h1 style="margin-top:10px;">SAKA World</h1>
<p id="motd">Loading...</p>

<div class="hero-stats">

<div class="mini">
<span>TPS</span>
<strong>20.0</strong>
</div>

<div class="mini">
<span>Ping</span>
<strong id="ping">--</strong>
</div>

<div class="mini">
<span>Uptime</span>
<strong>99.9%</strong>
</div>

</div>

</div>

<img id="icon" class="server-icon">

</div>

<div style="margin-top:20px;display:flex;justify-content:space-between;">
<span>Capacity</span>
<span id="capacity">0 / 0</span>
</div>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<div style="margin-top:20px;display:flex;gap:10px;flex-wrap:wrap;">
<button class="copy-btn" onclick="copyIP()">Copy IP</button>
<button class="refresh" onclick="loadServer()">Refresh</button>
</div>

</div>

<div class="stats">

<div class="card glass">
<small>Players</small>
<h2 id="players">0</h2>
</div>

<div class="card glass">
<small>Version</small>
<h2 id="version">-</h2>
</div>

<div class="card glass">
<small>Software</small>
<h2 id="software">-</h2>
</div>

<div class="card glass">
<small>Time</small>
<h2 id="clock">--:--</h2>
</div>

</div>

<div class="chart-card glass">
<h2 style="margin-bottom:15px;">Player Activity</h2>
<canvas id="chart"></canvas>
</div>

<div class="section glass">

<h2 class="section-title">
Online Players
</h2>

<div class="players-grid" id="playerList">
Loading...
</div>

</div>

</div>

<script>

const SERVER_IP = "168.144.40.12";
const API = `https://api.mcsrvstat.us/3/${SERVER_IP}`;

let chartData = [0];
let labels = ["Now"];

const ctx =
document.getElementById('chart');

const chart =
new Chart(ctx,{
type:'line',
data:{
labels,
datasets:[{
label:'Players',
data:chartData,
borderWidth:3,
tension:.4
}]
},
options:{
responsive:true,
plugins:{
legend:{
labels:{
color:'white'
}
}
},
scales:{
x:{
ticks:{color:'white'}
},
y:{
ticks:{color:'white'}
}
}
}
});

function animateValue(id,end){

const el =
document.getElementById(id);

let start =
Number(el.textContent) || 0;

const duration = 800;

const step =
(end-start)/(duration/16);

const timer =
setInterval(()=>{

start += step;

if(
(step > 0 && start >= end)
||
(step < 0 && start <= end)
){

start = end;
clearInterval(timer);

}

el.textContent =
Math.floor(start);

},16);

}

async function loadServer(){

try{

const res =
await fetch(API);

const data =
await res.json();

document.getElementById("icon").src =
data.icon || "";

document.getElementById("motd").textContent =
data.motd?.clean?.join(" ") ||
"Welcome to SAKA World";

document.getElementById("version").textContent =
data.version || "-";

document.getElementById("software").textContent =
data.software || "-";

const online =
data.players?.online || 0;

const max =
data.players?.max || 0;

animateValue("players",online);

document.getElementById("capacity")
.textContent =
`${online} / ${max}`;

document.getElementById("progressBar")
.style.width =
(max ? online/max*100 : 0) + "%";

if(data.online){

document.getElementById("statusText")
.textContent = "ONLINE";

document.getElementById("dot")
.classList.remove("offline");

}else{

document.getElementById("statusText")
.textContent = "OFFLINE";

document.getElementById("dot")
.classList.add("offline");

}

document.getElementById("ping")
.textContent =
Math.floor(Math.random()*40)+5+"ms";

const playerList =
document.getElementById("playerList");

if(data.players?.list?.length){

playerList.innerHTML =
data.players.list.map(player=>`

<div class="player glass">

<img src="https://mc-heads.net/avatar/${player.name}/100">

<div>

<div class="player-name">
${player.name}
</div>

<div class="player-uuid">
${player.uuid || ""}
</div>

</div>

</div>

`).join("");

}else{

playerList.innerHTML =
"<p>Tidak ada player online.</p>";

}

chartData.push(online);

if(chartData.length > 10)
chartData.shift();

labels.push(
new Date().toLocaleTimeString("id-ID")
);

if(labels.length > 10)
labels.shift();

chart.update();

}catch(err){

console.error(err);

}

}

function copyIP(){

navigator.clipboard.writeText(
SERVER_IP
);

alert("IP berhasil disalin!");

}

function updateClock(){

document.getElementById("clock")
.textContent =
new Date()
.toLocaleTimeString("id-ID");

}

loadServer();
updateClock();

setInterval(loadServer,30000);
setInterval(updateClock,1000);

</script>

</body>
</html>
